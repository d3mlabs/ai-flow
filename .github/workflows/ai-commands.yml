# ai-flow: reusable slash-command dispatcher (/ask, /edit, /split, /build).
#
# Adopting repos reference this via a ~10-line caller workflow (see
# templates/caller-workflow.yml). Jobs run on self-hosted runners carrying the
# headless Cursor `agent` CLI — Actions bills nothing for self-hosted jobs.
#
# Identity: an org-owned GitHub App (`ai-flow`) is the acting identity — no
# hosted component, purely a per-job token mint. App tokens (unlike the
# default GITHUB_TOKEN) trigger downstream workflows, so /build PRs get CI
# runs. The App is intrinsic to the attribution model, so missing App
# secrets fail the job loudly; adopters trying ai-flow before registering an
# App must opt into degraded github.token mode explicitly
# (allow_token_fallback). See docs/attribution.md for the full identity +
# attribution model.
name: ai-commands

on:
  workflow_call:
    inputs:
      command_prefix:
        description: >-
          Optional command prefix for adopters with clashing slash-command
          bots (e.g. "ai-" turns /ask into /ai-ask). We default to none.
        type: string
        default: ""
      per_actor_runners:
        description: >-
          Route every job to the commenter's own runner (labels
          ["self-hosted", "dev-<login>"]) instead of the shared pools. Compute
          scoping for multi-dev orgs; jobs queue while that dev's box is
          offline.
        type: boolean
        default: false
      allow_token_fallback:
        description: >-
          Run without the ai-flow GitHub App, degrading to the job's
          github.token: writes act as github-actions[bot] and /build PRs
          don't trigger CI. Off by default — the App is intrinsic to the
          attribution model, so degrading must be an explicit choice, never
          a silent one.
        type: boolean
        default: false
    secrets:
      CURSOR_API_KEY:
        description: Authenticates the headless Cursor agent CLI on the runner.
        required: true
      AI_FLOW_APP_ID:
        description: >-
          GitHub App ID for the ai-flow App. Effectively required — a job
          without it fails unless allow_token_fallback is set.
        required: false
      AI_FLOW_APP_PRIVATE_KEY:
        description: Private key for the ai-flow GitHub App.
        required: false

jobs:
  # Immediate 👀: the dispatch job serializes per issue/PR and runs on
  # self-hosted runners, so its own acknowledgment can lag (queued behind a
  # long /build, or the runner box offline). This job runs on GitHub-hosted
  # runners outside the concurrency group and reacts within seconds — free
  # on public repos, a few billed seconds on private ones. It reacts with
  # the App token so the identity matches the dispatcher's own ack and the
  # reactions API dedupes (two identities would render 👀 2). Coarse-filter
  # caveat: a prose mention that passes the contains() check gets eyes even
  # though the dispatcher will exit quietly — acceptable noise.
  #
  # CONTRIBUTOR passes the coarse association filter because review-comment
  # payloads under-report membership (an org MEMBER can arrive as
  # CONTRIBUTOR); the dispatcher re-checks authorization against the
  # collaborator-permission API and fails closed.
  ack:
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.comment.author_association) &&
      (contains(github.event.comment.body, format('/{0}ask', inputs.command_prefix)) ||
       contains(github.event.comment.body, format('/{0}edit', inputs.command_prefix)) ||
       contains(github.event.comment.body, format('/{0}split', inputs.command_prefix)) ||
       contains(github.event.comment.body, format('/{0}build', inputs.command_prefix)))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      AI_FLOW_APP_ID: ${{ secrets.AI_FLOW_APP_ID }}
    steps:
      - name: Mint the ai-flow App token
        id: app-token
        if: ${{ env.AI_FLOW_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AI_FLOW_APP_ID }}
          private-key: ${{ secrets.AI_FLOW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # A failed reaction must never paint a successful command run red —
      # warn and stay green (the dispatcher acks again as a backstop).
      - name: React 👀
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            path="repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions"
          else
            path="repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions"
          fi
          gh api -X POST "$path" -f content=eyes || echo "::warning::ack reaction failed"

  # The `if` runs in the workflow engine, so non-command comments never start
  # a job (no billed no-op runs — free anyway on self-hosted, but noisy). It
  # is a coarse contains() filter; the exact line-start command grammar and
  # the permission gate are re-checked by the Ruby dispatcher, which exits
  # cleanly on a mid-line prose mention. CONTRIBUTOR is allowed through for
  # the same reason as in the ack job: review-comment payloads under-report
  # membership, and the dispatcher's API-backed gate is the real one.
  dispatch:
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.comment.author_association) &&
      (contains(github.event.comment.body, format('/{0}ask', inputs.command_prefix)) ||
       contains(github.event.comment.body, format('/{0}edit', inputs.command_prefix)) ||
       contains(github.event.comment.body, format('/{0}split', inputs.command_prefix)) ||
       contains(github.event.comment.body, format('/{0}build', inputs.command_prefix)))
    # per_actor_runners routes to the commenter's own box; otherwise each
    # command routes to its own fixed label, ai-<command> — convention over
    # configuration (deployment decides the topology: one box can carry all
    # four labels, or a beefy box takes ai-build alone). A batch comment can
    # mix commands but the job runs on one box, so route by the heaviest
    # command present. Coarse contains() (a prose mention of /build in an
    # /edit comment routes heavy), which errs on the safe side: a heavier
    # pool can run anything lighter.
    runs-on: >-
      ${{ inputs.per_actor_runners && fromJSON(format('["self-hosted", "dev-{0}"]', github.event.comment.user.login))
          || contains(github.event.comment.body, format('/{0}build', inputs.command_prefix)) && fromJSON('["self-hosted", "ai-build"]')
          || contains(github.event.comment.body, format('/{0}split', inputs.command_prefix)) && fromJSON('["self-hosted", "ai-split"]')
          || contains(github.event.comment.body, format('/{0}edit', inputs.command_prefix)) && fromJSON('["self-hosted", "ai-edit"]')
          || fromJSON('["self-hosted", "ai-ask"]') }}
    # Serialize runs per issue/PR: batches assume a stable body snapshot.
    concurrency:
      group: ai-flow-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}
    timeout-minutes: 120
    # The secrets context is not valid in step-level `if:` (compile-time
    # "Unrecognized named-value: 'secrets'"), so the App presence check reads
    # the secret through a job-level env var instead.
    env:
      AI_FLOW_APP_ID: ${{ secrets.AI_FLOW_APP_ID }}
    steps:
      # The App carries the attribution model (bot identity + CI on /build
      # PRs), so its absence is a loud failure, not a silent degradation.
      - name: Require the ai-flow App
        if: ${{ env.AI_FLOW_APP_ID == '' && !inputs.allow_token_fallback }}
        run: |
          echo "::error::ai-flow requires its GitHub App (AI_FLOW_APP_ID / AI_FLOW_APP_PRIVATE_KEY secrets — see the README's identity section). To knowingly run degraded on github.token (writes act as github-actions[bot], /build PRs get no CI), set allow_token_fallback: true in the caller workflow."
          exit 1

      # Mint the App installation token (1h). owner (without a repositories
      # list) scopes it to every repo the App is installed on, not just the
      # triggering repo — /build pushes to other code repos and the private
      # ai-flow checkout below both need that reach.
      - name: Mint the ai-flow App token
        id: app-token
        if: ${{ env.AI_FLOW_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AI_FLOW_APP_ID }}
          private-key: ${{ secrets.AI_FLOW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check out the target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || github.token }}
          # Never bake the mint-time token into the repo's git config: App
          # tokens die at 1 hour and a long agent run outlives them (the
          # gh-34 failure). The dispatcher injects a fresh token per git
          # invocation instead (Executor + TokenProvider), so pushes still
          # act as the App — App-pushed branches and PRs trigger CI, which
          # the default GITHUB_TOKEN suppresses.
          persist-credentials: false

      # github.token is scoped to the triggering repo, so it can't read a
      # private ai-flow — the App token can (installed org-wide). Public
      # ai-flow forks work with the plain github.token fallback.
      - name: Check out ai-flow (the dispatcher)
        uses: actions/checkout@v4
        with:
          repository: d3mlabs/ai-flow
          path: .ai-flow
          token: ${{ steps.app-token.outputs.token || github.token }}
          # Read-only checkout — nothing pushes from here, so no credential
          # should linger in its git config for the agent to read.
          persist-credentials: false

      # The run must record exactly what code ran — the job log is ai-flow's
      # observability surface. Two ai-flow versions are in play and can
      # drift: this workflow YAML resolves from the caller's pin (the
      # floating v1 tag), while the dispatcher checkout above tracks main.
      # The model policy (.github/ai-flow.yml) and the menu of valid model
      # names (--list-models) are logged side by side, so a typo'd model is
      # diagnosable from the run page alone. Probes must never fail the job.
      - name: Log versions
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          echo "ai-flow dispatcher: $(git -C .ai-flow log -1 --format='%H (%s)')"
          echo "ai-flow workflow yaml: ${{ github.job_workflow_sha || '(empty on this runner — see referenced_workflows on the run API)' }}"
          echo "target repo: ${{ github.repository }}@$(git log -1 --format='%H')"
          echo "ruby: $(ruby --version)"
          echo "agent CLI: $("${AI_FLOW_AGENT_BIN:-agent}" --version 2>/dev/null || echo 'not found')"
          echo "::group::repo config (.github/ai-flow.yml)"
          [ -f .github/ai-flow.yml ] && cat .github/ai-flow.yml || echo "no .github/ai-flow.yml — code policy / CLI default"
          echo "::endgroup::"
          echo "::group::available models (agent --list-models)"
          "${AI_FLOW_AGENT_BIN:-agent}" --list-models 2>/dev/null || echo 'unavailable'
          echo "::endgroup::"

      - name: Dispatch
        env:
          # Fallback only: with App credentials the dispatcher mints its own
          # tokens per call (TokenProvider) — a pre-minted token dies at
          # GitHub's 1-hour cap, which a long agent run outlives.
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          # The dispatcher reads the key once and scrubs it from its env
          # before any subprocess (above all the agent) is spawned.
          AI_FLOW_APP_ID: ${{ secrets.AI_FLOW_APP_ID }}
          AI_FLOW_APP_PRIVATE_KEY: ${{ secrets.AI_FLOW_APP_PRIVATE_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AI_FLOW_COMMAND_PREFIX: ${{ inputs.command_prefix }}
          AI_FLOW_WORKDIR: ${{ github.workspace }}
          # App names are globally unique, so an adopter's App may not be
          # named ai-flow — derive the bot login from the actual slug.
          AI_FLOW_BOT_LOGIN: ${{ format('{0}[bot]', steps.app-token.outputs.app-slug || 'ai-flow') }}
        run: ruby .ai-flow/bin/dispatch.rb
