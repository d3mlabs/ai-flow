# ai-flow: reusable slash-command dispatcher (/ask, /edit, /split, /build).
#
# Adopting repos reference this via a ~10-line caller workflow (see
# templates/caller-workflow.yml). Jobs run on self-hosted runners carrying the
# headless Cursor `agent` CLI — Actions bills nothing for self-hosted jobs.
#
# Identity: an org-owned GitHub App (`ai-flow`) is the acting identity — no
# hosted component, purely a per-job token mint. App tokens (unlike the
# default GITHUB_TOKEN) trigger downstream workflows, so /build PRs get CI
# runs. The App is intrinsic to the attribution model, so missing App
# secrets fail the job loudly; adopters trying ai-flow before registering an
# App must opt into degraded github.token mode explicitly
# (allow_token_fallback). See docs/attribution.md for the full identity +
# attribution model.
name: ai-commands

on:
  workflow_call:
    inputs:
      command_prefix:
        description: >-
          Optional command prefix for adopters with clashing slash-command
          bots (e.g. "ai-" turns /ask into /ai-ask). We default to none.
        type: string
        default: ""
      light_runner_labels:
        description: Runner labels for /ask, /edit, and /split.
        type: string
        default: '["self-hosted", "ai-light"]'
      build_runner_labels:
        description: Runner labels for /build (heavier, e.g. warm Unreal envs).
        type: string
        default: '["self-hosted", "ai-build"]'
      per_actor_runners:
        description: >-
          Route every job to the commenter's own runner (labels
          ["self-hosted", "dev-<login>"]) instead of the shared pools. Compute
          scoping for multi-dev orgs; jobs queue while that dev's box is
          offline.
        type: boolean
        default: false
      allow_token_fallback:
        description: >-
          Run without the ai-flow GitHub App, degrading to the job's
          github.token: writes act as github-actions[bot] and /build PRs
          don't trigger CI. Off by default — the App is intrinsic to the
          attribution model, so degrading must be an explicit choice, never
          a silent one.
        type: boolean
        default: false
    secrets:
      CURSOR_API_KEY:
        description: Authenticates the headless Cursor agent CLI on the runner.
        required: true
      AI_FLOW_APP_ID:
        description: >-
          GitHub App ID for the ai-flow App. Effectively required — a job
          without it fails unless allow_token_fallback is set.
        required: false
      AI_FLOW_APP_PRIVATE_KEY:
        description: Private key for the ai-flow GitHub App.
        required: false

jobs:
  # The `if` runs in the workflow engine, so non-command comments never start
  # a job (no billed no-op runs — free anyway on self-hosted, but noisy). It
  # is a coarse contains() filter; the exact line-start command grammar and
  # the permission gate are re-checked by the Ruby dispatcher, which exits
  # cleanly on a mid-line prose mention.
  dispatch:
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
      (contains(github.event.comment.body, format('/{0}ask', inputs.command_prefix)) ||
       contains(github.event.comment.body, format('/{0}edit', inputs.command_prefix)) ||
       contains(github.event.comment.body, format('/{0}split', inputs.command_prefix)) ||
       contains(github.event.comment.body, format('/{0}build', inputs.command_prefix)))
    # per_actor_runners routes to the commenter's own box; otherwise /build
    # goes to the build pool and everything else to the light pool. Coarse (a
    # prose mention of /build in an /edit comment routes heavy), which errs on
    # the safe side: the build pool can run anything.
    runs-on: ${{ inputs.per_actor_runners && fromJSON(format('["self-hosted", "dev-{0}"]', github.event.comment.user.login)) || (contains(github.event.comment.body, format('/{0}build', inputs.command_prefix)) && fromJSON(inputs.build_runner_labels) || fromJSON(inputs.light_runner_labels)) }}
    # Serialize runs per issue/PR: batches assume a stable body snapshot.
    concurrency:
      group: ai-flow-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number }}
    timeout-minutes: 120
    # The secrets context is not valid in step-level `if:` (compile-time
    # "Unrecognized named-value: 'secrets'"), so the App presence check reads
    # the secret through a job-level env var instead.
    env:
      AI_FLOW_APP_ID: ${{ secrets.AI_FLOW_APP_ID }}
    steps:
      # The App carries the attribution model (bot identity + CI on /build
      # PRs), so its absence is a loud failure, not a silent degradation.
      - name: Require the ai-flow App
        if: ${{ env.AI_FLOW_APP_ID == '' && !inputs.allow_token_fallback }}
        run: |
          echo "::error::ai-flow requires its GitHub App (AI_FLOW_APP_ID / AI_FLOW_APP_PRIVATE_KEY secrets — see the README's identity section). To knowingly run degraded on github.token (writes act as github-actions[bot], /build PRs get no CI), set allow_token_fallback: true in the caller workflow."
          exit 1

      # Mint the App installation token (1h). owner (without a repositories
      # list) scopes it to every repo the App is installed on, not just the
      # triggering repo — /build pushes to other code repos and the private
      # ai-flow checkout below both need that reach.
      - name: Mint the ai-flow App token
        id: app-token
        if: ${{ env.AI_FLOW_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AI_FLOW_APP_ID }}
          private-key: ${{ secrets.AI_FLOW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check out the target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # The resolved token also lands in the persisted git credentials,
          # so /build pushes act as the App — App-pushed branches and PRs
          # trigger CI, which the default GITHUB_TOKEN suppresses.
          token: ${{ steps.app-token.outputs.token || github.token }}

      # github.token is scoped to the triggering repo, so it can't read a
      # private ai-flow — the App token can (installed org-wide). Public
      # ai-flow forks work with the plain github.token fallback.
      - name: Check out ai-flow (the dispatcher)
        uses: actions/checkout@v4
        with:
          repository: d3mlabs/ai-flow
          path: .ai-flow
          token: ${{ steps.app-token.outputs.token || github.token }}

      # The run must record exactly what code ran — the job log is ai-flow's
      # observability surface. Two ai-flow versions are in play and can
      # drift: this workflow YAML resolves from the caller's pin (the
      # floating v1 tag), while the dispatcher checkout above tracks main.
      # Version probes must never fail the job.
      - name: Log versions
        run: |
          echo "ai-flow dispatcher: $(git -C .ai-flow log -1 --format='%H (%s)')"
          echo "ai-flow workflow yaml: ${{ github.job_workflow_sha }}"
          echo "target repo: ${{ github.repository }}@$(git log -1 --format='%H')"
          echo "ruby: $(ruby --version)"
          echo "agent CLI: $("${AI_FLOW_AGENT_BIN:-agent}" --version 2>/dev/null || echo 'not found')"

      - name: Dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AI_FLOW_COMMAND_PREFIX: ${{ inputs.command_prefix }}
          AI_FLOW_WORKDIR: ${{ github.workspace }}
          # App names are globally unique, so an adopter's App may not be
          # named ai-flow — derive the bot login from the actual slug.
          AI_FLOW_BOT_LOGIN: ${{ format('{0}[bot]', steps.app-token.outputs.app-slug || 'ai-flow') }}
        run: ruby .ai-flow/bin/dispatch.rb
