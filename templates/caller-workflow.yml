# ai-flow caller workflow — copy to .github/workflows/ai-commands.yml in each
# participating repo (code repos and the org plans repo). Requires:
# - the org-level CURSOR_API_KEY secret (or a repo secret)
# - the org-level AI_FLOW_APP_ID / AI_FLOW_APP_PRIVATE_KEY secrets (the
#   ai-flow GitHub App — required; jobs fail without them unless you opt
#   into degraded mode with `with: { allow_token_fallback: true }`)
# - self-hosted runners labeled ai-light / ai-build (see d3mlabs/ai-flow README)
name: ai-commands

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-commands:
    uses: d3mlabs/ai-flow/.github/workflows/ai-commands.yml@v1
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      AI_FLOW_APP_ID: ${{ secrets.AI_FLOW_APP_ID }}
      AI_FLOW_APP_PRIVATE_KEY: ${{ secrets.AI_FLOW_APP_PRIVATE_KEY }}
